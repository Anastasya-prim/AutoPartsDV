# Запуск: скопируйте server/.env.example → server/.env, задайте JWT_SECRET и FRONTEND_URL.
# Корневой .env с NEXT_PUBLIC_API_URL нужен только если API на другом хосте (по умолчанию в образе /api)
services:
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      DATABASE_URL: file:./data/autoparts.db
      PORT: "4000"
    volumes:
      - sqlite_data:/app/data
    expose:
      - "4000"
    # Диагностика 502: curl http://127.0.0.1:4000/api/health с хоста VPS (минуя Nginx)
    ports:
      - "127.0.0.1:4000:4000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:4000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    restart: unless-stopped
    environment:
      NODE_ENV: production
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api

volumes:
  sqlite_data: {}
