<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Технические работы — AutoPartsDV</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(160deg, #f1f5f9 0%, #e2e8f0 100%);
      color: #0f172a;
      padding: 1.5rem;
    }
    .card {
      max-width: 28rem;
      width: 100%;
      background: #fff;
      border-radius: 1rem;
      box-shadow: 0 10px 40px rgba(15, 23, 42, 0.08);
      border: 1px solid #e2e8f0;
      padding: 2rem 1.75rem;
      text-align: center;
    }
    h1 {
      font-size: 1.35rem;
      font-weight: 700;
      margin: 0 0 0.75rem;
      line-height: 1.35;
    }
    p {
      margin: 0;
      color: #64748b;
      font-size: 0.95rem;
      line-height: 1.5;
    }
    .icon {
      width: 3rem;
      height: 3rem;
      margin: 0 auto 1.25rem;
      color: #2563eb;
    }
  </style>
</head>
<body>
  <div class="card">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" d="M11.42 15.17L17.25 21A2.652 2.652 0 0021 17.25l-5.877-5.877M11.42 15.17l2.496-3.03c.317-.384.74-.626 1.208-.766M11.42 15.17l-4.655-5.653a2.548 2.548 0 010-3.344l2.58-2.58a2.548 2.548 0 013.344 0l5.653 4.655a2.548 2.548 0 010 3.344l-3.03 2.496" />

    <p>Сайт временно недоступен. Пожалуйста, зайдите чуть позже — мы скоро вернёмся.</p>
  </div>
</body>
</html>
