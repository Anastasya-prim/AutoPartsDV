upstream next_upstream {
    server web:3000;
}

upstream nest_upstream {
    server api:4000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    # При падении web/api (502/503/504) — страница «техработы» вместо стандартной ошибки браузера
    proxy_intercept_errors on;
    error_page 502 503 504 /maintenance.html;

    location = /maintenance.html {
        root /usr/share/nginx/html;
        internal;
    }

    location /api {
        proxy_pass http://nest_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Поиск по поставщикам (Playwright) может занимать >60 с — иначе 504 и пустая выдача
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location / {
        proxy_pass http://next_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
