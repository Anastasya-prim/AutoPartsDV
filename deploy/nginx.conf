upstream next_upstream {
    server web:3000;
}

server {
    listen 80;
    server_name _;

    # DNS Docker внутри сети compose — иначе nginx иногда кэширует IP контейнера api и даёт 502 после перезапуска
    resolver 127.0.0.11 valid=10s ipv6=off;

    client_max_body_size 10M;

    location /api {
        set $nest_upstream api;
        proxy_pass http://$nest_upstream:4000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location / {
        proxy_pass http://next_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
