# Продакшен: HTTPS + редирект с 80, техработы при 502/503/504.
# На VPS: скопируйте этот файл в deploy/nginx.conf и перезапустите nginx:
#   cp deploy/nginx.autopartsdv.space.conf deploy/nginx.conf
#   docker compose -f docker-compose.yml -f docker-compose.https.yml exec nginx nginx -t
#   docker compose -f docker-compose.yml -f docker-compose.https.yml restart nginx

upstream next_upstream {
    server web:3000;
}

upstream nest_upstream {
    server api:4000;
}

server {
    listen 80;
    server_name autopartsdv.space www.autopartsdv.space;
    return 301 https://autopartsdv.space$request_uri;
}

server {
    listen 443 ssl http2;
    server_name autopartsdv.space www.autopartsdv.space;

    client_max_body_size 10M;

    proxy_intercept_errors on;
    error_page 502 503 504 /maintenance.html;

    location = /maintenance.html {
        root /usr/share/nginx/html;
        internal;
    }

    ssl_certificate     /etc/letsencrypt/live/autopartsdv.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/autopartsdv.space/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    location /api {
        proxy_pass http://nest_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location / {
        proxy_pass http://next_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
