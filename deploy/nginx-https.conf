# HTTPS-конфиг для Nginx в Docker.
#
# Перед включением:
# 1) Замените все YOUR_DOMAIN.ru на ваш домен (как в сертификате).
# 2) Получите сертификат Let's Encrypt на хосте VPS (см. deploy/README.md).
# 3) Скопируйте этот файл поверх nginx.conf ИЛИ смонтируйте как default.conf.
# 4) Подключите docker-compose.https.yml и перезапустите compose.
# 5) В server/.env задайте FRONTEND_URL=https://YOUR_DOMAIN.ru (без слэша в конце).
# 6) Пересоберите web: docker compose build --no-cache web && docker compose up -d
#
upstream next_upstream {
    server web:3000;
}

upstream nest_upstream {
    server api:4000;
}

# Редирект с HTTP на HTTPS
server {
    listen 80;
    server_name YOUR_DOMAIN.ru www.YOUR_DOMAIN.ru;
    return 301 https://YOUR_DOMAIN.ru$request_uri;
}

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN.ru www.YOUR_DOMAIN.ru;

    client_max_body_size 10M;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN.ru/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    location /api {
        proxy_pass http://nest_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location / {
        proxy_pass http://next_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
